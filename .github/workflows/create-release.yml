name: Create Release

on:
  schedule:
    - cron: '0 8 * * 2' # Every Tuesday at 8AM UTC
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        id: get-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@ae92934a14a48b94494dbc06d74a81d47fe08a40 # create-github-app-token/v0.2.2
        with:
          github_app: grafana-oss-big-tent

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.get-github-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check for existing changesets
        id: check-changesets
        run: |
          CHANGESET_FILES=$(find .changeset -name '*.md' ! -name 'README.md' -type f)
          if [ -z "$CHANGESET_FILES" ]; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create maintenance changeset
        if: steps.check-changesets.outputs.has_changesets == 'false'
        run: |
          CHANGESET_FILE=".changeset/maintenance-release-$(date +%s).md"
          echo '---' > "$CHANGESET_FILE"
          echo '"yugabyte": patch' >> "$CHANGESET_FILE"
          echo '---' >> "$CHANGESET_FILE"
          echo '' >> "$CHANGESET_FILE"
          echo 'maintenance release' >> "$CHANGESET_FILE"

      - name: Version packages
        run: yarn changeset version

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: release" || echo "No changes to commit"
          git push

      - name: Trigger publish workflow
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ steps.get-github-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish.yaml',
              ref: 'main',
              inputs: {
                branch: 'main',
                environment: 'prod',
                'docs-only': 'false'
              }
            });
